<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>焚烧炉 · LUMIÈRE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&family=LXGW+WenKai+TC:wght@300;400&display=swap');
:root{--cream:#faf6f0;--dark:#1a1510;--gold:#c9a96e;--gold-light:#e2c99a;--red:#8b4a5a;--rose:#d99aa6;--text:#2c2218;--muted:#8a7560;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(170deg,#fbf4f0,#f6ece2);color:var(--text);font-family:'LXGW WenKai TC','Noto Serif SC',serif;min-height:100vh;padding:0 0 60px;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;max-width:640px;margin:0 auto;}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:0.22em;color:var(--gold);cursor:pointer;}
.back{font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:0.05em;}
.back:hover{color:var(--gold);}
.wrap{max-width:640px;margin:0 auto;padding:0 22px;}

.hero{text-align:center;padding:6px 0 22px;}
.hero h1{font-family:'Cormorant Garamond','LXGW WenKai TC',serif;font-size:clamp(30px,6vw,42px);font-weight:400;color:var(--dark);letter-spacing:0.04em;}
.hero .sub{color:var(--muted);font-size:13.5px;margin-top:8px;font-weight:300;line-height:1.8;}
.count{font-size:12px;color:var(--gold);margin-top:10px;letter-spacing:0.04em;}

.blk{margin-bottom:22px;}
.blk-label{font-size:15px;color:var(--dark);margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:7px 15px;border:1px solid rgba(201,169,110,0.4);border-radius:20px;font-size:13.5px;color:var(--text);cursor:pointer;transition:all .2s;background:rgba(255,255,255,0.55);}
.chip:hover{border-color:var(--gold);}
.chip.on{background:var(--rose);color:#fff;border-color:var(--rose);}

.paper{position:relative;}
textarea{width:100%;padding:18px;border:1px solid rgba(201,169,110,0.4);background:rgba(255,255,255,0.8);color:var(--text);font-family:'LXGW WenKai TC','Noto Serif SC',serif;font-size:15px;line-height:2;outline:none;border-radius:12px;resize:vertical;min-height:150px;transition:all .5s;}
textarea:focus{border-color:var(--rose);}

.btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#d99066,#c9784f);color:#fff;font-family:'LXGW WenKai TC','Noto Serif SC',serif;font-size:15px;font-weight:500;letter-spacing:0.12em;cursor:pointer;transition:all .3s;box-shadow:0 10px 30px rgba(201,120,79,0.28);}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn.soft{background:transparent;border:1px solid var(--gold);color:var(--gold);box-shadow:none;font-weight:400;margin-top:10px;}
.btn.soft:hover{background:rgba(201,169,110,0.08);}

/* 完成态 */
.done{display:none;text-align:center;padding:20px 0;animation:rise .8s ease;}
.done.show{display:block;}
.done .glow{width:120px;height:120px;border-radius:50%;margin:10px auto 26px;background:radial-gradient(circle,rgba(226,201,154,0.5),rgba(217,154,102,0.12));animation:pulse 3s ease-in-out infinite;}
.done h2{font-family:'Cormorant Garamond','LXGW WenKai TC',serif;font-size:30px;font-weight:400;color:var(--dark);margin-bottom:16px;}
.done p{font-size:15px;line-height:2;color:var(--muted);font-weight:300;margin-bottom:28px;}
@keyframes pulse{0%,100%{transform:scale(0.9);opacity:.7;}50%{transform:scale(1.05);opacity:1;}}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* 科学依据 */
.sci{margin-top:34px;border-top:1px solid rgba(201,169,110,0.25);padding-top:20px;}
.sci-toggle{font-size:13.5px;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:0.02em;}
.sci-body{display:none;margin-top:16px;}
.sci-body.show{display:block;animation:rise .5s ease;}
.sci-item{background:rgba(255,253,250,0.7);border:1px solid rgba(201,169,110,0.22);border-left:3px solid var(--rose);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.sci-item b{color:var(--dark);font-weight:500;}
.sci-item .t{font-size:14px;line-height:1.85;color:var(--text);font-weight:300;}
.sci-item .src{font-size:11.5px;color:var(--muted);margin-top:6px;font-style:italic;}
.sci-note{font-size:12.5px;color:var(--muted);line-height:1.9;margin-top:6px;}

/* 火焰灰烬层 */
#emberLayer{position:fixed;inset:0;pointer-events:none;z-index:60;}
.ember{position:fixed;pointer-events:none;animation:emberRise ease-out forwards;}
@keyframes emberRise{
  0%{transform:translateY(0) translateX(0) rotate(0) scale(0.5);opacity:0;}
  12%{opacity:0.95;}
  100%{transform:translateY(-72vh) translateX(var(--dx,20px)) rotate(var(--rot,60deg)) scale(1.1);opacity:0;}
}
.flash{position:fixed;inset:0;background:radial-gradient(circle at 50% 62%,rgba(255,224,178,0.55),transparent 60%);opacity:0;pointer-events:none;z-index:55;animation:flash 1.6s ease-out forwards;}
@keyframes flash{0%{opacity:0;}20%{opacity:1;}100%{opacity:0;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo" onclick="location.href='/jijiu.html'">LUMIÈRE</div>
  <a class="back" href="/jijiu.html" id="backLink">← 情绪急救室</a>
</div>

<div class="wrap">
  <div class="hero">
    <h1 id="hTitle">焚烧炉</h1>
    <div class="sub" id="hSub">把说不出口、又不想发出去的，交给一场温柔的焚烧。</div>
    <div class="count" id="burnCount"></div>
  </div>

  <div id="setup">
    <div class="blk">
      <div class="blk-label" id="l1">此刻，你是什么感觉？</div>
      <div class="chips" id="emotionChips"></div>
    </div>
    <div class="blk paper">
      <div class="blk-label" id="l2">把想对他说、却不想发的话，写在这里——</div>
      <textarea id="burnText" placeholder="想说什么就写什么，没有人会看到。写完，我们一起烧掉它。"></textarea>
    </div>
    <button class="btn" id="burnBtn" onclick="burn()">焚烧 ✦</button>
  </div>

  <div class="done" id="done">
    <div class="glow"></div>
    <h2 id="dTitle">烧掉了。</h2>
    <p id="dBody">你没有把它发给他——你把它交给了自己。<br>这一下，你选择了自己。</p>
    <button class="btn" id="againBtn" onclick="reset()">再写一次</button>
    <button class="btn soft" onclick="location.href='/jijiu.html'" id="homeBtn">回到情绪急救室</button>
  </div>

  <div class="sci">
    <div class="sci-toggle" id="sciToggle" onclick="toggleSci()"><span id="sciArrow">▸</span> <span id="sciLabel">为什么写下来、烧掉，真的会让你轻一点？</span></div>
    <div class="sci-body" id="sciBody"></div>
  </div>
</div>

<div id="emberLayer"></div>

<script src="/i18n.js?v=5"></script>
<script src="/analytics.js?v=1"></script>
<script>
function L(zh,en){ return window.LUMI_LANG==='en' ? en : zh; }
var EMOTIONS = [
  ['愤怒','Anger'],['委屈','Hurt'],['不甘','Unwilling'],['思念','Longing'],
  ['难过','Grief'],['失望','Letdown'],['想他','Missing him'],['恨自己','Self-blame'],
  ['放不下','Can’t let go'],['空','Empty']
];
var selEmotion = '';

var SCI = [
  { zh:['说出情绪，就能"降火"','把感受用语言命名，会抑制大脑的情绪警报（杏仁核）、让理性重新上线——所谓 <i>name it to tame it</i>。','来源：UCLA · Lieberman 等，情绪命名（affect labeling）研究'],
    en:['Naming a feeling cools it down','Putting an emotion into words calms the brain’s alarm (the amygdala) and brings reason back online — <i>name it to tame it</i>.','Source: UCLA · Lieberman et al., affect-labeling research'] },
  { zh:['写出来本身就在疗愈','把情绪写下来，哪怕没有人会看，也能改善情绪与身心状态。','来源：心理学家 James Pennebaker · 表达性书写研究'],
    en:['Writing it out is itself healing','Putting feelings on the page — even if no one ever reads them — improves mood and well-being.','Source: James Pennebaker · expressive-writing research'] },
  { zh:['仪式，给你"翻篇感"','哪怕是自创的、没有"魔力"的小仪式（写下再销毁），也能明显降低失落与焦虑，因为它带来掌控感和了结感。','来源：哈佛 · Norton & Gino，仪式与丧失研究'],
    en:['Rituals give you closure','Even a self-made ritual with no “magic” (write it, then destroy it) measurably lowers grief and anxiety — it restores a sense of control.','Source: Harvard · Norton & Gino, rituals & loss'] },
  { zh:['"丢弃"，就是放下','把写着负面想法的东西销毁、丢掉，那个想法对你的影响会真的减弱。物理上的丢弃 = 心理上的放下。','来源：Briñol 等，"扔掉念头"具身认知研究'],
    en:['Throwing it away is letting go','Destroying or discarding a written negative thought actually weakens its hold on you. Physical disposal = psychological release.','Source: Briñol et al., embodied “discard your thoughts” study'] }
];

function renderStatic(){
  var en = window.LUMI_LANG==='en';
  document.getElementById('backLink').textContent = L('← 情绪急救室','← First-Aid');
  document.getElementById('hTitle').textContent = L('焚烧炉','The Furnace');
  document.getElementById('hSub').innerHTML = L('把说不出口、又不想发出去的，交给一场温柔的焚烧。','Give what you can’t say — and won’t send — to a gentle burning.');
  document.getElementById('l1').textContent = L('此刻，你是什么感觉？','How do you feel right now?');
  document.getElementById('l2').textContent = L('把想对他说、却不想发的话，写在这里——','Write what you want to say to him but won’t send —');
  document.getElementById('burnText').placeholder = L('想说什么就写什么，没有人会看到。写完，我们一起烧掉它。','Write anything — no one will ever see it. When you’re done, we’ll burn it together.');
  document.getElementById('burnBtn').textContent = L('焚烧 ✦','Burn it ✦');
  document.getElementById('dTitle').textContent = L('烧掉了。','It’s gone.');
  document.getElementById('dBody').innerHTML = L('你没有把它发给他——你把它交给了自己。<br>这一下，你选择了自己。','You didn’t send it to him — you gave it to yourself.<br>This time, you chose you.');
  document.getElementById('againBtn').textContent = L('再写一次','Write again');
  document.getElementById('homeBtn').textContent = L('回到情绪急救室','Back to First-Aid');
  document.getElementById('sciLabel').textContent = L('为什么写下来、烧掉，真的会让你轻一点？','Why writing it down and burning it truly helps');
  renderChips(); renderCount(); renderSci();
}
function renderChips(){
  document.getElementById('emotionChips').innerHTML = EMOTIONS.map(function(e){
    var t = window.LUMI_LANG==='en'?e[1]:e[0];
    return '<span class="chip'+(selEmotion===e[0]?' on':'')+'" onclick="pickEmotion(\''+e[0]+'\',this)">'+t+'</span>';
  }).join('');
}
function pickEmotion(zh, el){
  selEmotion = zh;
  document.querySelectorAll('#emotionChips .chip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
}
function renderCount(){
  var n = parseInt(localStorage.getItem('lumiere_burn_count')||'0',10);
  document.getElementById('burnCount').textContent = n>0 ? L('你已经放下了 '+n+' 次','You’ve released '+n+' time'+(n>1?'s':'')) : '';
}
function renderSci(){
  var en = window.LUMI_LANG==='en';
  document.getElementById('sciBody').innerHTML = SCI.map(function(s){
    var d = en?s.en:s.zh;
    return '<div class="sci-item"><div class="t"><b>'+d[0]+'</b><br>'+d[1]+'</div><div class="src">'+d[2]+'</div></div>';
  }).join('') + '<div class="sci-note">'+L('所以"焚烧"不是仪式感或玄学，是有心理学实验支撑的自我疗愈。','So “burning” isn’t just aesthetics or superstition — it’s self-healing backed by psychology.')+'</div>';
}
function toggleSci(){
  var b=document.getElementById('sciBody'), a=document.getElementById('sciArrow');
  var open=b.classList.toggle('show'); a.textContent = open?'▾':'▸';
}

// 生成一片灰烬/花瓣
function emberSvg(){
  var colors=['#e2c99a','#d99066','#e0a97a','#d99aa6','#c9a96e','#e8b4c0'];
  var c=colors[Math.floor(Math.random()*colors.length)];
  var petal='<path d="M12 2 C7 8 7 16 12 22 C17 16 17 8 12 2 Z"/>';
  var spark='<path d="M12 3 L13.5 10.5 L21 12 L13.5 13.5 L12 21 L10.5 13.5 L3 12 L10.5 10.5 Z"/>';
  var shape = Math.random()<0.6 ? petal : spark;
  var sz = 10 + Math.random()*16;
  return '<svg width="'+sz.toFixed(0)+'" height="'+sz.toFixed(0)+'" viewBox="0 0 24 24" fill="'+c+'">'+shape+'</svg>';
}
function burn(){
  var txt = document.getElementById('burnText').value.trim();
  if(!txt){ document.getElementById('burnText').focus(); return; }
  var layer = document.getElementById('emberLayer');
  // 闪光
  var fl=document.createElement('div'); fl.className='flash'; document.body.appendChild(fl);
  setTimeout(function(){ fl.remove(); }, 1600);
  // 文字化灰
  var ta=document.getElementById('burnText');
  ta.style.transition='all 1s'; ta.style.opacity='0'; ta.style.filter='blur(4px)';
  document.getElementById('setup').style.transition='opacity .8s';
  // 灰烬上升
  for(var i=0;i<44;i++){
    (function(k){
      setTimeout(function(){
        var e=document.createElement('div'); e.className='ember';
        var left = 20 + Math.random()*60;         // 屏幕中段
        var bottom = 22 + Math.random()*30;
        var dx = (Math.random()*80-40).toFixed(0)+'px';
        var rot = (Math.random()*180-90).toFixed(0)+'deg';
        var dur = (2.4 + Math.random()*2.2).toFixed(1);
        e.style.cssText='left:'+left.toFixed(1)+'%;bottom:'+bottom.toFixed(1)+'%;--dx:'+dx+';--rot:'+rot+';animation-duration:'+dur+'s;';
        e.innerHTML=emberSvg();
        layer.appendChild(e);
        setTimeout(function(){ e.remove(); }, dur*1000+200);
      }, k*30);
    })(i);
  }
  // 计数
  try{ var n=parseInt(localStorage.getItem('lumiere_burn_count')||'0',10)+1; localStorage.setItem('lumiere_burn_count', String(n)); }catch(e){}
  // 切完成态
  setTimeout(function(){
    document.getElementById('setup').style.display='none';
    var d=document.getElementById('done'); d.classList.add('show'); d.style.display='block';
    renderCount();
    window.scrollTo({top:0,behavior:'smooth'});
  }, 1400);
}
function reset(){
  var ta=document.getElementById('burnText'); ta.value=''; ta.style.opacity=''; ta.style.filter='';
  selEmotion=''; renderChips();
  document.getElementById('done').classList.remove('show'); document.getElementById('done').style.display='none';
  document.getElementById('setup').style.display='block';
}

renderStatic();
window.addEventListener('lumi-lang', function(){ renderStatic(); });
</script>
<script src="/music.js?v=1"></script>
</body>
</html>
