<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMIÈRE · 登陆</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&family=LXGW+WenKai+TC:wght@300;400&display=swap');
:root{--cream:#faf6f0;--dark:#1a1510;--gold:#c9a96e;--red:#8b4a5a;--text:#2c2218;--muted:#8a7560;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--text);font-family:'LXGW WenKai TC','Noto Serif SC',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}

/* ── 背景线条花卉装饰 ── */
.floral-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.35;}

.auth-container{max-width:420px;width:100%;padding:40px 32px;position:relative;z-index:1;}
.auth-logo{font-family:'Cormorant Garamond','LXGW WenKai TC','Noto Serif SC',serif;font-size:28px;letter-spacing:0.22em;color:var(--gold);text-align:center;margin-bottom:40px;}
.auth-title{font-family:'Cormorant Garamond','LXGW WenKai TC','Noto Serif SC',serif;font-size:32px;font-weight:300;letter-spacing:0.08em;text-align:center;color:var(--dark);margin-bottom:10px;}
.auth-sub{font-size:13px;letter-spacing:0.1em;color:var(--muted);text-align:center;margin-bottom:36px;}
.auth-divider{width:50px;height:1px;background:var(--gold);margin:0 auto 28px;opacity:0.55;}

.form-group{margin-bottom:20px;}
.form-label{font-size:12px;letter-spacing:0.1em;color:var(--text);margin-bottom:8px;display:block;font-weight:500;}
.form-input{width:100%;padding:12px 16px;border:1px solid rgba(201,169,110,0.35);background:rgba(255,253,250,0.9);color:var(--text);font-family:'LXGW WenKai TC','Noto Serif SC',serif;font-size:14px;outline:none;transition:all 0.3s;}
.form-input:focus{border-color:var(--gold);background:white;box-shadow:0 0 0 3px rgba(201,169,110,0.1);}

.checkbox-group{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.checkbox-group input{cursor:pointer;}

.auth-btn{width:100%;padding:14px;background:var(--dark);color:var(--cream);border:none;cursor:pointer;font-size:13px;letter-spacing:0.1em;font-family:'LXGW WenKai TC','Noto Serif SC',serif;font-weight:500;transition:all 0.3s;margin-top:28px;}
.auth-btn:hover{background:var(--gold);color:var(--dark);}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;}

.auth-toggle{text-align:center;font-size:13px;color:var(--muted);margin-top:20px;}
.auth-toggle a{color:var(--gold);cursor:pointer;text-decoration:none;border-bottom:1px solid rgba(201,169,110,0.35);}
.auth-toggle a:hover{border-bottom-color:var(--gold);}

.auth-form{display:none;}
.auth-form.active{display:block;}

.error-msg{background:rgba(139,74,90,0.1);border:1px solid rgba(139,74,90,0.3);color:var(--red);padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:16px;display:none;}
.error-msg.show{display:block;}

.loading{display:none;text-align:center;color:var(--muted);font-size:13px;}
.loading.show{display:block;}
.spinner{width:16px;height:16px;border:2px solid rgba(201,169,110,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 装饰线条元素 ── */
.floral-accent{position:absolute;pointer-events:none;}
</style>
</head>
<body>

<svg class="floral-bg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      .flower-stroke { fill: none; stroke: rgba(201,169,110,0.4); stroke-width: 0.8; stroke-linecap: round; stroke-linejoin: round; }
      .flower-fill { fill: rgba(201,169,110,0.15); stroke: rgba(201,169,110,0.3); stroke-width: 0.6; }
    </style>
  </defs>

  <!-- 左上角：精致线条花朵 -->
  <g transform="translate(80,100)">
    <!-- 花瓣 (5片) -->
    <ellipse cx="0" cy="-12" rx="5" ry="12" class="flower-fill" transform="rotate(0)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="12" class="flower-fill" transform="rotate(72)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="12" class="flower-fill" transform="rotate(144)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="12" class="flower-fill" transform="rotate(216)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="12" class="flower-fill" transform="rotate(288)"/>
    <!-- 花心 -->
    <circle cx="0" cy="0" r="3" fill="rgba(201,169,110,0.35)"/>
  </g>

  <!-- 右下角：细长叶片组 -->
  <g transform="translate(1100,680)">
    <path d="M 0 0 Q 3 -8 2 -16" class="flower-stroke"/>
    <path d="M 0 0 Q -3 -8 -2 -16" class="flower-stroke"/>
    <path d="M 0 0 Q 5 -10 6 -20" class="flower-stroke"/>
    <path d="M 0 2 Q -4 -6 -5 -14" class="flower-stroke"/>
  </g>

  <!-- 左下角：最小花朵 -->
  <g transform="translate(150,750)">
    <circle cx="-8" cy="0" r="3" class="flower-fill"/>
    <circle cx="8" cy="0" r="3" class="flower-fill"/>
    <circle cx="0" cy="-7" r="3" class="flower-fill"/>
    <circle cx="0" cy="7" r="3" class="flower-fill"/>
    <circle cx="0" cy="0" r="2" fill="rgba(201,169,110,0.4)"/>
  </g>

  <!-- 顶部中央：线条草 -->
  <g transform="translate(600,30)">
    <path d="M 0 0 L 0 -20 M -2 -15 L 2 -18 M 2 -15 L -2 -18" class="flower-stroke"/>
    <path d="M 8 2 L 10 -18 M 8 -14 L 12 -17 M 12 -14 L 8 -17" class="flower-stroke"/>
    <path d="M -8 1 L -10 -19 M -10 -15 L -6 -18 M -6 -15 L -10 -18" class="flower-stroke"/>
  </g>

  <!-- 右上角：三叶草 -->
  <g transform="translate(1050,120)">
    <ellipse cx="-5" cy="-5" rx="4" ry="6" class="flower-fill" transform="rotate(-30)"/>
    <ellipse cx="5" cy="-5" rx="4" ry="6" class="flower-fill" transform="rotate(30)"/>
    <ellipse cx="0" cy="6" rx="4" ry="6" class="flower-fill"/>
    <circle cx="0" cy="0" r="2" fill="rgba(201,169,110,0.3)"/>
  </g>

  <!-- 中间右侧：细线花 -->
  <g transform="translate(950,400)">
    <line x1="0" y1="0" x2="0" y2="-15" class="flower-stroke"/>
    <line x1="0" y1="-8" x2="-4" y2="-12" class="flower-stroke"/>
    <line x1="0" y1="-8" x2="4" y2="-12" class="flower-stroke"/>
    <circle cx="0" cy="-2" r="2.5" class="flower-fill"/>
  </g>
</svg>

<div class="auth-container">
  <div class="auth-logo">LUMIÈRE</div>
  <h1 class="auth-title">欢迎回家</h1>
  <div class="auth-divider"></div>
  <p class="auth-sub">继续你的显化之旅</p>

  <!-- Google 登录 -->
  <button type="button" id="googleBtn" onclick="loginWithGoogle()" class="auth-btn" style="background:#fff;color:#3c3c3c;border:1px solid rgba(201,169,110,0.5);display:flex;align-items:center;justify-content:center;gap:10px;">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    使用 Google 登录
  </button>
  <div style="display:flex;align-items:center;gap:12px;margin:22px 0;color:#8a7560;font-size:12px;">
    <div style="flex:1;height:1px;background:rgba(201,169,110,0.3);"></div>或用邮箱<div style="flex:1;height:1px;background:rgba(201,169,110,0.3);"></div>
  </div>

  <!-- 登陆表单 -->
  <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
    <div class="error-msg" id="loginError"></div>

    <div class="form-group">
      <label class="form-label">邮箱</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="你的邮箱" required>
    </div>

    <div class="form-group">
      <label class="form-label">密码</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="输入密码" required>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="rememberMe">
      <label for="rememberMe">记住我</label>
    </div>

    <button type="submit" class="auth-btn" id="loginBtn">登陆</button>

    <div class="loading" id="loginLoading">
      <span class="spinner"></span>登陆中...
    </div>

    <div class="auth-toggle">
      还没有账户？<a onclick="switchForm('signup')">立即注册</a>
    </div>
  </form>

  <!-- 注册表单 -->
  <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
    <div class="error-msg" id="signupError"></div>

    <div class="form-group">
      <label class="form-label">邮箱</label>
      <input type="email" class="form-input" id="signupEmail" placeholder="你的邮箱" required>
    </div>

    <div class="form-group">
      <label class="form-label">设置密码</label>
      <input type="password" class="form-input" id="signupPassword" placeholder="至少8位" minlength="8" required>
    </div>

    <div class="form-group">
      <label class="form-label">确认密码</label>
      <input type="password" class="form-input" id="signupPasswordConfirm" placeholder="重复密码" required>
    </div>

    <button type="submit" class="auth-btn" id="signupBtn">注册</button>

    <div class="loading" id="signupLoading">
      <span class="spinner"></span>注册中...
    </div>

    <div class="auth-toggle">
      已有账户？<a onclick="switchForm('login')">登陆</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const API_BASE = '/api/lumiere';

// ── Google 登录（Supabase Auth，用邮箱桥接到现有账号系统）──
const SUPABASE_URL = 'https://wxyusmvjttrkzfyngzoz.supabase.co';
const SUPABASE_ANON = 'sb_publishable_vuPNacIJivUbArsX9lb9pQ_BKVwL2kO';
let sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } catch (e) { console.error('supabase init failed', e); }

async function loginWithGoogle() {
  if (!sb) { alert('登录组件加载失败，请刷新页面重试'); return; }
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/auth.html' }
  });
  if (error) alert('Google 登录失败：' + error.message);
}

// Google 授权回跳后：拿到 session → 用邮箱调 init_user → 桥接进现有账号体系
async function handleOAuthReturn() {
  if (!sb) return;
  try {
    const { data } = await sb.auth.getSession();
    const session = data && data.session;
    if (!session || !session.user || !session.user.email) return;
    const email = session.user.email;
    const res = await fetch(`${API_BASE}?action=init_user`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, type: 'oauth', provider: 'google' })
    });
    const d = await res.json();
    if (d.ok) {
      localStorage.setItem('lumiere_user_id', d.user_id);
      localStorage.setItem('lumiere_email', email);
      localStorage.setItem('lumiere_remember', 'true');
      if (d.is_new) localStorage.setItem('lumiere_is_new', 'true');
      window.location.href = '/index.html';
    }
  } catch (e) { console.error('oauth return failed', e); }
}
handleOAuthReturn();

function switchForm(form) {
  document.getElementById('loginForm').classList.toggle('active', form === 'login');
  document.getElementById('signupForm').classList.toggle('active', form === 'signup');
  document.getElementById('loginError').classList.remove('show');
  document.getElementById('signupError').classList.remove('show');
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('rememberMe').checked;

  const loginBtn = document.getElementById('loginBtn');
  const loginLoading = document.getElementById('loginLoading');
  const errorMsg = document.getElementById('loginError');

  loginBtn.disabled = true;
  loginLoading.classList.add('show');
  errorMsg.classList.remove('show');

  try {
    const res = await fetch(`${API_BASE}?action=init_user`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, type: 'login' })
    });

    const data = await res.json();

    if (data.ok) {
      localStorage.setItem('lumiere_user_id', data.user_id);
      localStorage.setItem('lumiere_email', email);

      if (remember) {
        localStorage.setItem('lumiere_remember', 'true');
      }

      window.location.href = '/index.html';
    } else {
      errorMsg.textContent = data.error || '登陆失败，请检查邮箱和密码';
      errorMsg.classList.add('show');
    }
  } catch (err) {
    errorMsg.textContent = '网络错误，请稍后重试';
    errorMsg.classList.add('show');
    console.error(err);
  } finally {
    loginBtn.disabled = false;
    loginLoading.classList.remove('show');
  }
}

async function handleSignup(e) {
  e.preventDefault();
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const confirmPassword = document.getElementById('signupPasswordConfirm').value;

  const errorMsg = document.getElementById('signupError');
  errorMsg.classList.remove('show');

  if (password !== confirmPassword) {
    errorMsg.textContent = '两次密码不一致';
    errorMsg.classList.add('show');
    return;
  }

  const signupBtn = document.getElementById('signupBtn');
  const signupLoading = document.getElementById('signupLoading');

  signupBtn.disabled = true;
  signupLoading.classList.add('show');

  try {
    const res = await fetch(`${API_BASE}?action=init_user`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, type: 'signup' })
    });

    const data = await res.json();

    if (data.ok) {
      localStorage.setItem('lumiere_user_id', data.user_id);
      localStorage.setItem('lumiere_email', email);
      localStorage.setItem('lumiere_is_new', 'true');

      window.location.href = '/index.html';
    } else {
      errorMsg.textContent = data.error || '注册失败，请稍后重试';
      errorMsg.classList.add('show');
    }
  } catch (err) {
    errorMsg.textContent = '网络错误，请稍后重试';
    errorMsg.classList.add('show');
    console.error(err);
  } finally {
    signupBtn.disabled = false;
    signupLoading.classList.remove('show');
  }
}

window.addEventListener('load', () => {
  const userId = localStorage.getItem('lumiere_user_id');
  const remember = localStorage.getItem('lumiere_remember');

  if (userId && remember) {
    window.location.href = '/index.html';
  }
});
</script>
<script src="/i18n.js?v=6"></script>
<script src="/analytics.js?v=1"></script>
<script src="/music.js?v=1"></script>
</body>
</html>
